name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: lint · typecheck · test · build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # First-class Windows: postmortem's primary dev platform (CLAUDE.md).
        os: [ubuntu-latest, windows-latest]
        node: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      # `npm ci` builds better-sqlite3 from its prebuilt binary; the fallback
      # to a source build needs no extra toolchain on the GitHub runners.
      - name: Install
        run: npm ci

      - name: Lint & format check
        run: npx biome check .

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
